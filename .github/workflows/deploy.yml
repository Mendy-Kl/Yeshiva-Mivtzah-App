# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

# Run the workflow on every push to the `main` branch and allow manual execution.
on:
  push:
    branches: ['main']
  workflow_dispatch:

# Grant the appropriate permissions so actions can deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments from clashing.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    # The deploy job is run in the GitHub Pages environment so the URL is available.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository code.
      - name: Checkout source code
        uses: actions/checkout@v6

      # Set up a Node environment with caching for npm.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # Install npm dependencies.
      - name: Install dependencies
        run: npm ci

      # Build the Vite application. This outputs the production files into the `dist` folder.
      - name: Build the site
        run: npm run build

      # Configure Pages for this job.
      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Upload the built site as an artifact for deployment. Adjust `path` if your build output is elsewhere.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'dist'

      # Deploy the artifact to GitHub Pages. This step publishes the site to the `gh-pages` branch
      # and sets the `page_url` output used above.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
